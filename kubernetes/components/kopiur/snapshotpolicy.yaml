# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
spec:
  repository:
    kind: ClusterRepository
    name: garage-primary
  sources:
    - pvc:
        name: "${CLAIM:=${APP}}"
  retention:
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
