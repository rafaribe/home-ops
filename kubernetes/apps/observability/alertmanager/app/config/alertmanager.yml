receivers:
  - name: "null"
  - name: "discord"
    discord_configs:
      - webhook_url_file: /etc/secrets/DISCORD_WEBHOOK_URL
        send_resolved: true
        title: |-
          {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        message: |-
          {{- range .Alerts }}
          **Alert:** {{ .Labels.alertname }}
          **Severity:** {{ if eq .Labels.severity "critical" }}🚨 Critical{{ else if eq .Labels.severity "warning" }}⚠️ Warning{{ else }}ℹ️ {{ .Labels.severity }}{{ end }}
          **Namespace:** `{{ .Labels.namespace }}`
          {{- if ne .Annotations.description "" }}
          **Description:** {{ .Annotations.description }}
          {{- else if ne .Annotations.summary "" }}
          **Summary:** {{ .Annotations.summary }}
          {{- else if ne .Annotations.message "" }}
          **Message:** {{ .Annotations.message }}
          {{- end }}
          {{- if ne .Labels.pod "" }}
          **Pod:** `{{ .Labels.pod }}`
          {{- end }}
          {{- if ne .Labels.node "" }}
          **Node:** `{{ .Labels.node }}`
          {{- end }}
          ---
          {{- end }}

route:
  group_by: ["alertname", "job"]
  group_interval: 5m
  group_wait: 30s
  receiver: "discord"
  repeat_interval: 6h
  routes:
    - matchers:
        - alertname =~ "InfoInhibitor|Watchdog"
      receiver: "null"

inhibit_rules:
  - equal: ["alertname", "namespace"]
    source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
