---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: Europe/Lisbon
      envFrom:
        - secretRef:
            name: gatus-secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - status.rafaribe.com
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
    monitoring:
      serviceMonitor:
        enabled: true
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: ceph-block
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 512Mi
    sidecar:
      kinds:
        httproute:
          auto: true
          enable: true
        service:
          enable: true
