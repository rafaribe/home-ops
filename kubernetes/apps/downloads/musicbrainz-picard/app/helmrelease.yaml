---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app musicbrainz-picard
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      musicbrainz-picard:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/jlesage/musicbrainz-picard
              tag: v26.05.2@sha256:130ab9790d6303c2534dbfcc59d136b010c43d021cfdedf37f76935300698996
            env:
              DARK_MODE: "1"
              DISPLAY_HEIGHT: "1080"
              DISPLAY_WIDTH: "1920"
              KEEP_APP_RUNNING: "1"
              TZ: Europe/Lisbon
              USER_ID: "1000"
              GROUP_ID: "1000"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 10m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    persistence:
      config:
        existingClaim: musicbrainz-picard
        globalMounts:
          - path: /config
      docker-instance:
        type: emptyDir
        globalMounts:
          - path: /.docker-instance
      storage:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/media
        globalMounts:
          - path: /storage
    route:
      app:
        hostnames: ["picard.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: &port 5800
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
