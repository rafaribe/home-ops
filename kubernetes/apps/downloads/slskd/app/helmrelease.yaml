---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app slskd
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      slskd:
        annotations:
          glance/description: Soulseek Client
          glance/icon: di:slskd
          glance/id: slskd
          glance/name: slskd
          glance/url: https://slskd.rafaribe.com
          reloader.stakater.com/auto: "true"
        initContainers:
          init-dirs:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command:
              - sh
              - -c
              - mkdir -p /media/downloads/slskd/complete /media/downloads/slskd/incomplete
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3
            env:
              DOTNET_BUNDLE_EXTRACT_BASE_DIR: /tmp/.net
              SLSKD_APP_DIR: /config
              SLSKD_HTTP_PORT: &port 80
              SLSKD_NO_AUTH: true
              SLSKD_NO_HTTPS: true
              SLSKD_NO_VERSION_CHECK: true
              SLSKD_REMOTE_CONFIGURATION: true
              SLSKD_SLSK_LISTEN_PORT: &soulseekPort 50300
              TZ: Europe/Lisbon
            envFrom:
              - secretRef:
                  name: slskd
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
          filebrowser:
            image:
              repository: ghcr.io/gtsteffaniak/filebrowser
              tag: 1.4.0-stable-slim@sha256:436bb660ae4bd84e7bffd70b14aa4a11c3438bc593d3c207213c4e383d0ba255
            env:
              FILEBROWSER_CONFIG: /config/config.yaml
            probes:
              liveness: &fb-probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &fb-port 8080
                  periodSeconds: 10
              readiness: *fb-probes
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
    configMaps:
      config:
        data:
          slskd.yml: |-
            directories:
              downloads: /media/downloads/slskd/complete
              incomplete: /media/downloads/slskd/incomplete
            permissions:
              file:
                mode: 750
            shares:
              directories:
                - /media/music
              filters:
                - \.ini$
                - Thumbs.db$
                - \.DS_Store$
      filebrowser-config:
        data:
          config.yaml: |
            auth:
              methods:
                noauth: true
            server:
              port: 8080
              cacheDir: /home/filebrowser/data/cache
              sources:
                - path: /media/downloads/slskd
                  config:
                    defaultEnabled: true
    persistence:
      config:
        existingClaim: slskd
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/slskd.yml
            subPath: slskd.yml
      filebrowser-config:
        type: configMap
        identifier: filebrowser-config
        advancedMounts:
          slskd:
            filebrowser:
              - path: /config/config.yaml
                subPath: config.yaml
                readOnly: true
      filebrowser-data:
        type: emptyDir
        advancedMounts:
          slskd:
            filebrowser:
              - path: /home/filebrowser/data
      media:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: slskd
          gethomepage.dev/description: "Soulseek Client"
          gethomepage.dev/icon: slskd
          gethomepage.dev/widget.type: slskd
          gethomepage.dev/widget.url: "http://slskd-app.downloads.svc.cluster.local"
          gethomepage.dev/widget.key: "{{ `{{HOMEPAGE_VAR_SLSKD_API_KEY}}` }}"
        hostnames: ["slskd.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
      filebrowser:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: slskd Files
          gethomepage.dev/description: "slskd File Browser"
          gethomepage.dev/icon: filebrowser
        hostnames: ["slskd-files.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: filebrowser
                port: http
    service:
      app:
        controller: slskd
        ports:
          http:
            port: *port
      filebrowser:
        controller: slskd
        ports:
          http:
            port: *fb-port
      soulseek:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.0.1.34
        controller: slskd
        externalTrafficPolicy: Local
        ports:
          soulseek-tcp:
            port: *soulseekPort
            protocol: TCP
