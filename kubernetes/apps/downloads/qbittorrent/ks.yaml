apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbittorrent
spec:
  path: ./kubernetes/apps/downloads/qbittorrent/app
  prune: true
  targetNamespace: downloads
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  postBuild:
    substitute:
      APP: *app
      GATUS_SUBDOMAIN: qb
      CLAIM: qbittorrent
      KOPIUR_CAPACITY: 2Gi
      KOPIUR_SNAPSHOTCLASS: csi-ceph-filesystem
  components:
    - ../../../../components/kopiur/backup-nopvc
  dependsOn:
    - name: kopiur
      namespace: kopiur-system
    - name: rook-ceph-cluster
      namespace: rook-ceph
---
