---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app explo
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      explo:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lumepart/explo
              tag: v1.1.2@sha256:9e136d99536e03595d055645908d166b527706db3c15d75b70bc14e4dd93f95b
            env:
              DOWNLOAD_SERVICES: slskd
              EXPLO_SYSTEM: subsonic
              MIGRATE_DOWNLOADS: "true"
              TZ: Europe/Lisbon
              WEB_UI: "true"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              limits:
                memory: 512Mi
              requests:
                cpu: 10m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /opt/explo/config
      crontabs:
        type: emptyDir
        globalMounts:
          - path: /etc/crontabs
      data:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/media/music/explo
        globalMounts:
          - path: /data
      slskd:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/media/downloads/slskd/complete
        globalMounts:
          - path: /slskd
      tmp:
        type: emptyDir
    route:
      app:
        hostnames: ["explo.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: &port 7288
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
