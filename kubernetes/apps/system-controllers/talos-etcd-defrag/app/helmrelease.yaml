---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app talos-etcd-defrag
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  values:
    controllers:
      talos-etcd-defrag:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: "true"
        cronjob:
          schedule: "30 3 * * *" # Nightly at 3:30 AM
          timeZone: &timeZone Europe/Lisbon
          concurrencyPolicy: Allow
          successfulJobsHistory: 3
          failedJobsHistory: 3
          parallelism: 3
        replicas: 3
        containers:
          app:
            image:
              repository: ghcr.io/siderolabs/talosctl
              tag: v1.13.5
            args:
              - --nodes=$(NODE_IP)
              - etcd
              - defrag
            env:
              TZ: *timeZone
              NODE_IP:
                valueFrom:
                  fieldRef:
                    fieldPath: status.hostIP
              TALOSCONFIG: /var/run/secrets/talos.dev/config
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        serviceAccount:
          identifier: *app

    serviceAccount:
      talos-etcd-defrag:
        enabled: true

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: *app
              topologyKey: kubernetes.io/hostname

    persistence:
      talos-secrets:
        type: secret
        name: talos-etcd-defrag
        globalMounts:
          - path: /var/run/secrets/talos.dev
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
