---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app reaplet
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      reaplet:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: *app
        containers:
          app:
            image:
              repository: ghcr.io/rafaribe/reaplet
              tag: 0.9.0@sha256:c7359bc623f462e125ae598b8a987d3fe40cdadb87df733b5b9b48ddd3e8d676
            env:
              PORT: "8080"
              TALOSCONFIG: /var/run/secrets/talos.dev/config
              DB_PATH: /data/reaplet.db
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 3
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 65534

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534

    persistence:
      talosconfig:
        type: secret
        name: reaplet-talosconfig
        globalMounts:
          - path: /var/run/secrets/talos.dev
            readOnly: true
      data:
        existingClaim: reaplet
        globalMounts:
          - path: /data

    route:
      app:
        hostnames:
          - "reaplet.rafaribe.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    service:
      app:
        controller: reaplet
        ports:
          http:
            port: *port

    serviceAccount:
      reaplet:
        enabled: true
