---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app reaplet
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      reaplet:
        type: daemonset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          hostPID: true
          nodeSelector:
            kubernetes.io/arch: arm64
          tolerations:
            - operator: Exists
              effect: NoSchedule
        serviceAccount:
          identifier: *app
        containers:
          app:
            image:
              repository: ghcr.io/rafaribe/reaplet
              tag: 0.2.1@sha256:e96a126672ab785500c3a340a13ea355a850f8b5cbd96c2440518e9fe738b09b
            env:
              CRI_SOCKET: unix:///run/containerd/containerd.sock
              NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              PORT: "8080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/nodes
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/nodes
                    port: *port
                  initialDelaySeconds: 3
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              privileged: true

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 0
        runAsNonRoot: false
        runAsUser: 0

    persistence:
      containerd-socket:
        type: hostPath
        hostPath: /run/containerd/containerd.sock
        hostPathType: Socket
        globalMounts:
          - path: /run/containerd/containerd.sock
            readOnly: false

    route:
      app:
        hostnames:
          - "reaplet.rafaribe.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    service:
      app:
        controller: reaplet
        ports:
          http:
            port: *port

    serviceAccount:
      reaplet:
        enabled: true
