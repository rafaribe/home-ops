---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kanidm-secrets
spec:
  targetNamespace: security
  commonMetadata:
    labels:
      app.kubernetes.io/name: kanidm
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
  interval: 30m
  path: ./kubernetes/apps/security/kanidm/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kanidm
spec:
  targetNamespace: security
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/kopiur/snapshot-only
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
    - name: kanidm-secrets
    - name: kopiur
      namespace: kopiur-system
  interval: 30m
  path: ./kubernetes/apps/security/kanidm/app
  postBuild:
    substitute:
      APP: *app
      CLAIM: kanidm-data-kanidm-default-0
    substituteFrom:
      - kind: Secret
        name: kanidm-persons-secret
  prune: true
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
