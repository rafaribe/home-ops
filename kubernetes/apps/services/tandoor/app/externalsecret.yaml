---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tandoor
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      data:
        # General
        SECRET_KEY: "{{ .TANDOOR_SECRET_KEY }}"
        # Database - SQLite stored on PVC
        DB_ENGINE: django.db.backends.sqlite3
        POSTGRES_DB: /opt/recipes/mediafiles/db.sqlite3
        # Email
        EMAIL_HOST: "smtp-relay-noreply.services.svc.cluster.local"
        EMAIL_PORT: "25"
        EMAIL_USE_SSL: "1"
        DEFAULT_FROM_EMAIL: "noreply@rafaribe.com"
        ACCOUNT_EMAIL_SUBJECT_PREFIX: "[Rafaribe Recipes]"
        # OpenId Connect - Kanidm
        SOCIAL_PROVIDERS: allauth.socialaccount.providers.openid_connect
        SOCIALACCOUNT_PROVIDERS: '{"openid_connect":{"SERVERS":[{"id":"kanidm","name":"Kanidm","server_url":"https://idm.rafaribe.com/oauth2/openid/tandoor/.well-known/openid-configuration","token_auth_method":"client_secret_basic","APP":{"client_id":"{{ .OIDC_CLIENT_ID }}","secret":"{{ .OIDC_CLIENT_SECRET }}"}}]}}'
  dataFrom:
    - extract:
        key: /tandoor
    - extract:
        key: /tandoor/oidc
