---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tandoor
spec:
  targetNamespace: services
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 10m
  path: "./kubernetes/apps/services/tandoor/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: kanidm
      namespace: security
  components:
    - ../../../../components/kanidm
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *app
      HOSTNAME: tandoor.rafaribe.com
      APP_UID: "1000"
      APP_GID: "1000"
      KANIDM_APP_ICON: https://cdn.jsdelivr.net/gh/selfhst/icons/png/tandoor-recipes.png
      KANIDM_CLIENT_ID_KEY: OIDC_CLIENT_ID
      KANIDM_CLIENT_SECRET_KEY: OIDC_CLIENT_SECRET
      KANIDM_DISABLE_PKCE: "true"
      KANIDM_GROUP: household
      KANIDM_ORIGIN_HOST: tandoor.rafaribe.com
      KANIDM_REDIRECT_PATH: accounts/oidc/kanidm/login/callback/
