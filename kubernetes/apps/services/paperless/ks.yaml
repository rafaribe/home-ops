---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
  labels:
    substitution.flux.home.arpa/enabled: "true"
spec:
  path: "./kubernetes/apps/services/paperless/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  dependsOn:
    - name: kanidm
      namespace: security
    - name: kopiur
      namespace: kopiur-system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: paperless
      namespace: services
  targetNamespace: services
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  postBuild:
    substitute:
      APP: *app
      APP_UID: "1000"
      APP_GID: "1000"
      CLAIM: paperless
      KOPIUR_CAPACITY: 15Gi
      KANIDM_APP_ICON: https://cdn.jsdelivr.net/gh/selfhst/icons/png/paperless-ngx.png
      KANIDM_CLIENT_ID_KEY: PAPERLESS_OIDC_CLIENT_ID
      KANIDM_CLIENT_SECRET_KEY: PAPERLESS_OIDC_CLIENT_SECRET
      KANIDM_GROUP: household
      KANIDM_ORIGIN_HOST: paperless.rafaribe.com
      KANIDM_REDIRECT_PATH: accounts/oidc/kanidm/login/callback/
  components:
    - ../../../../components/kopiur/backup-nopvc
    - ../../../../components/dragonfly
    - ../../../../components/kanidm
