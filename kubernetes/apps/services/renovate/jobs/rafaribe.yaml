---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/generators.external-secrets.io/githubaccesstoken_v1alpha1.json
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: renovate-bot-auth-token
spec:
  appID: "260101"
  installID: "31076334"
  auth:
    privateKey:
      secretRef:
        name: renovate-bot-pem
        key: private_key_pem
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name renovate-bot-auth-token
spec:
  target:
    name: *name
    template:
      type: Opaque
      engineVersion: v2
      data:
        GITHUB_COM_TOKEN: "{{ .token }}"
        GITHUB_COM_USER: naoki-bot
        RENOVATE_TOKEN: "{{ .token }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: renovate-bot-auth-token
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: rafaribe
spec:
  discoveryFilters: ["rafaribe/*"]
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_PLATFORM_COMMIT_ENABLED
      value: "true"
  image: ghcr.io/renovatebot/renovate:43.257.5
  parallelism: 5
  provider:
    name: github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 20 * * * *
  secretRef: renovate-bot-auth-token
  webhook:
    enabled: true
    authentication:
      enabled: false
