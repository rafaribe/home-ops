---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app syncstorage-rs
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      syncstorage-rs:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            envFrom:
              - secretRef:
                  name: syncstorage-rs
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
        containers:
          app:
            image:
              repository: ghcr.io/mozilla-services/syncstorage-rs/syncstorage-rs-postgres
              tag: ab47abaaed@sha256:af1c2ae27d8a1afaf761c7000c30b821e07d78a5b5d8da800f82b6c6cb893fc0
            env:
              SYNC_HOST: "0.0.0.0"
              SYNC_PORT: "8000"
              SYNC_TOKENSERVER__ENABLED: "true"
              SYNC_TOKENSERVER__RUN_MIGRATIONS: "true"
              SYNC_TOKENSERVER__FXA_EMAIL_DOMAIN: "api.accounts.firefox.com"
              SYNC_TOKENSERVER__FXA_OAUTH_SERVER_URL: "https://oauth.accounts.firefox.com"
              SYNC_TOKENSERVER__INIT_NODE_URL: "https://firefox-sync.rafaribe.com"
            envFrom:
              - secretRef:
                  name: syncstorage-rs
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /__heartbeat__
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              limits:
                memory: 512Mi
              requests:
                cpu: 10m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    persistence:
      tmp:
        globalMounts:
          - path: /tmp
        type: emptyDir
    route:
      app:
        hostnames:
          - firefox-sync.rafaribe.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: syncstorage-rs
                port: 8000
    service:
      app:
        controller: syncstorage-rs
        ports:
          http:
            port: 8000
