---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name mealie
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        DB_ENGINE: "sqlite"
        # Base Values
        BASE_URL: https://mealie.rafaribe.com
        ALLOW_SIGNUP: "false"
        AUTO_BACKUP_ENABLED: "true"
        API_DOCS: "false"
        TZ: Europe/Lisbon
        WORKERS_PER_CORE: "1"
        MAX_WORKERS: "1"
        WEB_CONCURRENCY: "1"
        # OIDC
        OIDC_AUTH_ENABLED: "true"
        OIDC_CLIENT_ID: "{{ .OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
        OIDC_CONFIGURATION_URL: "https://idm.rafaribe.com/oauth2/openid/mealie/.well-known/openid-configuration"
        OIDC_AUTO_REDIRECT: "false"
        OIDC_PROVIDER_NAME: Kanidm
        OIDC_REMEMBER_ME: "true"
        OIDC_SIGNING_ALGORITHM: ES256
        OIDC_SIGNUP_ENABLED: "true"
        OIDC_USER_CLAIM: preferred_username
        OIDC_USER_GROUP: household@idm.rafaribe.com
        OIDC_ADMIN_GROUP: household@idm.rafaribe.com

  dataFrom:
    - extract:
        key: /mealie
