---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: mealie
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      mealie:
        strategy: Recreate

        annotations:
          glance/description: Recipe Manager
          glance/icon: di:mealie
          glance/id: mealie
          glance/name: Mealie
          glance/url: https://mealie.rafaribe.com
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.1
              pullPolicy: IfNotPresent
            env:
              PGID: "1000"
              PUID: "1000"
            envFrom:
              - secretRef:
                  name: *app
              - secretRef:
                  name: mealie-kanidm-oauth2-credentials
                  optional: true
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add:
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                drop:
                  - ALL
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 9000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Mealie
          gethomepage.dev/icon: mealie.svg
          gethomepage.dev/group: Home
          gethomepage.dev/href: https://mealie.rafaribe.com
          gethomepage.dev/widget.type: mealie
          gethomepage.dev/widget.url: http://mealie.services:9000
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_MEALIE_API_KEY}}`}}"
          gethomepage.dev/widget.version: "2"
          gethomepage.dev/widget.fields: '["recipes", "users", "categories", "tags"]'
          hajimari.io/enable: "true"
          hajimari.io/icon: "food"
          hajimari.io/appName: "Mealie"
          hajimari.io/group: "Home"

        hostnames: ["mealie.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
      backups:
        type: nfs
        server: truenas.rafaribe.com
        path: "/mnt/storage-0/mealie"
        globalMounts:
          - path: /app/data/backups
