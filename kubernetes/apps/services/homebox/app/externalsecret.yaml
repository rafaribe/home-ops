---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name homebox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
  data:
    - secretKey: HBOX_AUTH_API_KEY_PEPPER
      remoteRef:
        key: /homebox
        property: HOMEBOX_AUTH_API_KEY_PEPPER
  dataFrom:
    - extract:
        key: /homebox
