---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app slink
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      slink:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: anirdev/slink
              tag: v1.11.6@sha256:bd3966434e94d718de332fb9c2278ec43f71413a1bcf9b395d9024322de49843
            env:
              ORIGIN: https://slink.rafaribe.com
              STORAGE_PROVIDER: local
              TZ: Europe/Lisbon
              USER_ALLOW_GUEST_UPLOADS: "true"
              IMAGE_MAX_SIZE: 50M
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/var/data
            subPath: data
          - path: /app/slink/images
            subPath: images
    route:
      app:
        hostnames:
          - slink.rafaribe.com
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: &port 3000
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 3000
