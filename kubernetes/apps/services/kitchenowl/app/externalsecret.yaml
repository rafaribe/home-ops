---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app kitchenowl
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *app
    template:
      engineVersion: v2
      data:
        # App
        JWT_SECRET_KEY: "{{ .KITCHENOWL_JWT_TOKEN }}"
        # Database
        DB_DRIVER: sqlite
        DB_NAME: /data/kitchenowl.db
        # OIDC
        OIDC_ISSUER: "https://idm.rafaribe.com/oauth2/openid/kitchenowl"
  dataFrom:
    - extract:
        key: /kitchenowl
