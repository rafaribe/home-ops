  - name: News
    columns:
      - size: full
        widgets:
          - type: hacker-news
            limit: 10
            collapse-after: 5
          - type: reddit
            subreddit: selfhosted
            collapse-after: 5
          - type: rss
            title: News
            collapse-after: 5
            feeds:
              - url: https://www.techmeme.com/feed.xml
                title: Techmeme
              - url: https://news.ycombinator.com/rss
                title: Hacker News
      - size: small
        widgets:
          - type: releases
            title: Releases
            show-source-icon: true
            repositories:
              - glanceapp/glance
              - immich-app/immich
              - gethomepage/homepage
              - paperless-ngx/paperless-ngx

  - name: Homelab
    columns:
      - size: small
        widgets:
          - type: monitor
            title: Infrastructure
            cache: 1m
            style: "row"
            sites:
              - title: Ceph
                url: https://rook.rafaribe.com
                check-url: http://rook-ceph-mgr-dashboard.rook-ceph.svc.cluster.local:7000
                icon: mdi:chess-rook
          - type: monitor
            cache: 1m
            style: "row"
            sites:
              - title: Garage
                url: https://garage.rafaribe.com
                check-url: http://garage-webui.storage.svc.cluster.local:3909
                icon: mdi:garage
          - type: monitor
            cache: 1m
            style: "row"
            sites:
              - title: Konflate
                url: https://konflate.rafaribe.com
                check-url: http://konflate.development.svc.cluster.local:8080
                icon: di:flux-cd
          - type: monitor
            cache: 1m
            style: "row"
            sites:
              - title: Flux Operator UI
                url: https://flux.rafaribe.com
                check-url: http://flux-operator.flux-system.svc.cluster.local:9080
                icon: di:flux-cd
          - type: monitor
            cache: 1m
            style: "row"
            sites:
              - title: Grafana
                url: https://grafana.rafaribe.com
                check-url: http://grafana-service.observability.svc.cluster.local:3000
                icon: di:grafana
      - size: full
        widgets:
          - type: extension
            url: http://glance-k8s-extension.services:8080/extension/nodes
            title: Cluster Nodes
            allow-potentially-dangerous-html: true
            cache: 30s
      - size: small
        widgets:
          - type: repository
            repository: rafaribe/home-ops
            pull-requests-limit: 5
            issues-limit: 3
