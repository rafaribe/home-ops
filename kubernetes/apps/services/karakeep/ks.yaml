---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app karakeep
spec:
  targetNamespace: services
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 30m
  timeout: 5m
  path: "./kubernetes/apps/services/karakeep/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: kanidm
      namespace: security
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
    - name: external-secrets-stores
      namespace: external-secrets
  components:
    - ../../../../components/kanidm
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *app
      KANIDM_CLIENT_ID_KEY: OAUTH_CLIENT_ID
      KANIDM_CLIENT_SECRET_KEY: OAUTH_CLIENT_SECRET
      KANIDM_ORIGIN_HOST: karakeep.rafaribe.com
      KANIDM_REDIRECT_PATH: api/auth/callback/kanidm
      VOLSYNC_CRONEXPRESSION: "28 * * * *"
