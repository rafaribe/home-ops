---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app safebucket
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      safebucket:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/safebucket/safebucket
              tag: 0.6.1@sha256:8fd0f3e434c39114b3d976e1bbe7f17757dce2b134c688f3b8279b0e8ad21cfa
            env:
              APP__ALLOWED_ORIGINS: https://safebucket.rafaribe.com
              APP__API_URL: https://safebucket.rafaribe.com
              APP__LOG_LEVEL: info
              APP__MAX_UPLOAD_SIZE: "53687091200"
              APP__MFA_REQUIRED: "false"
              APP__PORT: "8080"
              APP__PROFILE: default
              APP__STATIC_FILES__ENABLED: "true"
              APP__TRASH_RETENTION_DAYS: "7"
              APP__TRUSTED_PROXIES: 10.42.0.0/16,10.43.0.0/16
              APP__WEB_URL: https://safebucket.rafaribe.com
              AUTH__PROVIDERS__KEYS: local
              AUTH__PROVIDERS__LOCAL__NAME: local
              AUTH__PROVIDERS__LOCAL__SHARING__ALLOWED: "true"
              AUTH__PROVIDERS__LOCAL__TYPE: local
              CACHE__TYPE: valkey
              CACHE__VALKEY__HOSTS: safebucket-dragonfly.services.svc.cluster.local:6379
              DATABASE__SQLITE__PATH: /app/data/safebucket.db
              DATABASE__TYPE: sqlite
              EVENTS__QUEUES__BUCKET_EVENTS__NAME: safebucket-bucket-events
              EVENTS__QUEUES__NOTIFICATIONS__NAME: safebucket-notifications
              EVENTS__QUEUES__OBJECT_DELETION__NAME: safebucket-object-deletion
              EVENTS__TYPE: memory
              GOGC: "50"
              NOTIFIER__FILESYSTEM__DIRECTORY: /app/data/notifications
              NOTIFIER__TYPE: filesystem
              STORAGE__RUSTFS__BUCKET_NAME: safebucket
              STORAGE__RUSTFS__ENDPOINT: garage.storage.svc.cluster.local:3900
              STORAGE__RUSTFS__EXTERNAL_ENDPOINT: https://s3.rafaribe.com
              STORAGE__TYPE: rustfs
              TZ: Europe/Lisbon
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      app:
        hostnames:
          - safebucket.rafaribe.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 8080
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
