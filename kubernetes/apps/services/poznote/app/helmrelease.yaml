---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app poznote
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      poznote:
        annotations:
          glance/description: Note-taking app
          glance/icon: mdi:note-text
          glance/id: poznote
          glance/name: Poznote
          glance/url: https://poznote.rafaribe.com
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/timothepoznanski/poznote
              tag: "6"
            env:
              TZ: Europe/Lisbon
              SQLITE_DATABASE: /var/www/html/data/database/poznote.db
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
          mcp-server:
            image:
              repository: ghcr.io/timothepoznanski/poznote-mcp
              tag: "6"
            env:
              POZNOTE_API_URL: http://localhost:80/api/v1
              POZNOTE_DEBUG: "false"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
          mcp:
            port: 8045

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Services
          gethomepage.dev/name: Poznote
          gethomepage.dev/icon: https://raw.githubusercontent.com/timothepoznanski/poznote/main/public/favicon.ico
          gethomepage.dev/description: Note-taking app
          gethomepage.dev/siteMonitor: http://poznote.services:80
        hostnames: ["poznote.rafaribe.com"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /var/www/html/data
