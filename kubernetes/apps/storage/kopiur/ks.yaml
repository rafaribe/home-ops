# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopiur
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-provider
  path: ./kubernetes/apps/storage/kopiur/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  targetNamespace: storage
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
  namespace: flux-system
spec:
  dependsOn:
    - name: kopiur
    - name: external-secrets-provider
  path: ./kubernetes/apps/storage/kopiur/repository
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  targetNamespace: storage
  commonMetadata:
    labels:
      app.kubernetes.io/name: kopiur
