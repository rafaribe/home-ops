---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seafile
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  dependsOn:
    - name: seafile-dragonfly
      namespace: storage
  values:
    controllers:
      seafile:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/seafileltd/seafile-mc
              tag: 13.0.21
            env:
              CACHE_PROVIDER: redis
              FORCE_HTTPS_IN_CONF: "true"
              REDIS_HOST: seafile-dragonfly.storage.svc.cluster.local
              REDIS_PORT: "6379"
              SEAFILE_MYSQL_DB_HOST: "127.0.0.1"
              SEAFILE_SERVER_HOSTNAME: seafile.rafaribe.com
              SEAFILE_SERVER_PROTOCOL: https
              TIME_ZONE: Europe/Lisbon
            envFrom:
              - secretRef:
                  name: seafile-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 80
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
          mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: "12.2"
            env:
              MARIADB_AUTO_UPGRADE: "true"
              MYSQL_LOG_CONSOLE: "true"
            envFrom:
              - secretRef:
                  name: seafile-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - healthcheck.sh
                      - --connect
                      - --innodb_initialized
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - healthcheck.sh
                      - --connect
                      - --innodb_initialized
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: seafile
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - seafile.rafaribe.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: seafile
        advancedMounts:
          seafile:
            app:
              - path: /shared
      mysql:
        existingClaim: seafile-mariadb
        advancedMounts:
          seafile:
            mariadb:
              - path: /var/lib/mysql
