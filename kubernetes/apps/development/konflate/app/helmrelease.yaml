---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 30m
  values:
    config:
      mcp: true
      prComments: true
      publicUrl: https://konflate.rafaribe.com
      repo: github://rafaribe/home-ops
      statusChecks: true
    httpRoute:
      enabled: true
      hostnames:
        - konflate.rafaribe.com
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
    nodeSelector:
      kubernetes.io/hostname: tpi-3
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 50m
        memory: 512Mi
    secret:
      existingSecret: konflate-secret
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/memory
        operator: Exists
