---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  interval: 30m
  values:
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
              workdir_parent: shared/workdir
            host:
              workdir_parent: /data/act
            kubernetes:
              namespace: development
              poll_timeout: 10m
            log:
              level: info
            plugins:
              k8s:
                address: unix:///plugin/forgejo-runner-k8s.sock
                options:
                  namespace: development
                  poll_timeout: 10m
            runner:
              capacity: 4
              labels:
                - ubuntu-latest:k8s:/config/podspec-default.yaml
                - ubuntu-24.04:k8s:/config/podspec-default.yaml
                - default:k8s:/config/podspec-default.yaml
              timeout: 3h
              shutdown_timeout: 3m
          podspec-default.yaml: |-
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
            restartPolicy: Never
    controllers:
      forgejo-runner:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/arch
                        operator: In
                        values:
                          - amd64
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - tpi-1
          automountServiceAccountToken: true
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          terminationGracePeriodSeconds: 300
        initContainers:
          k8s-plugin:
            image:
              repository: registry.erwanleboucher.dev/erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: 12.10.6@sha256:b0ffe279448c70fb3327485163da8da2ce12fa9cc39a29231edd676c9025c036
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            restartPolicy: Always
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
        containers:
          runner:
            image:
              repository: registry.erwanleboucher.dev/erwanleboucher.dev/eleboucher/runner
              tag: 12.10.2@sha256:d5eeafda573012c229b730f5a18437b464d946473478e1f6bd56fd537b881609
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url "http://forgejo-http.development.svc.cluster.local:3000" \
                  --uuid "$${FORGEJO_RUNNER_UUID}" \
                  --token "$${FORGEJO_RUNNER_TOKEN}"
            envFrom:
              - secretRef:
                  name: forgejo-runner-secret
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      plugin:
        type: emptyDir
        globalMounts:
          - path: /plugin
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
    rbac:
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups: ["batch"]
              resources: [jobs]
              verbs: [create, get, list, watch, delete]
            - apiGroups: [""]
              resources: [pods]
              verbs: [list, watch, get]
            - apiGroups: [""]
              resources: [pods/exec]
              verbs: [create, get]
            - apiGroups: [""]
              resources: [pods/log]
              verbs: [list, watch, get]
    serviceAccount:
      forgejo-runner: {}
