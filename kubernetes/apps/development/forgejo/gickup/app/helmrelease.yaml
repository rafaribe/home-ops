---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gickup
spec:
  chartRef:
    kind: OCIRepository
    name: gickup
  interval: 30m
  values:
    configMaps:
      config:
        data:
          config.yaml: |
            source:
              github:
                - token_file: /secrets/GITHUB_TOKEN
                  user: rafaribe
                  wiki: false
                  starred: false
            destination:
              gitea:
                - token_file: /secrets/FORGEJO_TOKEN
                  url: http://forgejo-http.development.svc.cluster.local:3000
                  user: rafaribe
                  createorg: true
                  mirror:
                    enabled: true
                  visibility:
                    repositories: private
        suffix: config
    controllers:
      gickup:
        type: cronjob
        cronjob:
          failedJobsHistory: 1
          schedule: "0 */6 * * *"
          successfulJobsHistory: 1
        containers:
          app:
            args:
              - /config/config.yaml
            image:
              repository: ghcr.io/cooperspencer/gickup
              tag: 0.10.44@sha256:5060d8e4cb7ff7bc6cdda4724d979220daf50d6bd8e30aecc0a90797c4ee64f6
            resources:
              limits:
                memory: 3Gi
              requests:
                cpu: 10m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
            readOnly: true
      secrets:
        type: secret
        name: gickup
        globalMounts:
          - path: /secrets
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
