---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nodecast-tv
spec:
  chartRef:
    kind: OCIRepository
    name: nodecast-tv
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      nodecast-tv:
        strategy: Recreate
        annotations:
          secret.reloader.stakater.com/reload: nodecast-tv-secret
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: ghcr.io/technomancer702/nodecast-tv
              tag: 2.1.1@sha256:9937173524774d718c998a768d27bb3b7bf9d2575277715c7230307d6e99904a
            env:
              NODE_ENV: production
              OIDC_CALLBACK_URL: "https://nodecast-tv.rafaribe.com/api/auth/oidc/callback"
              OIDC_ISSUER_URL: "https://idm.rafaribe.com/oauth2/openid/nodecast-tv"
              PORT: &httpPort 3000
            envFrom:
              - secretRef:
                  name: nodecast-tv-kanidm-oauth2-credentials
                  optional: true
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
      transcode-cache:
        type: emptyDir
        globalMounts:
          - path: /app/transcode-cache
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: NodeCast TV
          gethomepage.dev/icon: https://raw.githubusercontent.com/technomancer702/nodecast-tv/main/public/favicon.ico
          gethomepage.dev/description: Web-based IPTV player
        hostnames:
          - nodecast.rafaribe.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *httpPort
    service:
      app:
        ports:
          http:
            port: *httpPort
