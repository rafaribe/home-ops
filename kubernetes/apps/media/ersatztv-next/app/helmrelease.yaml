---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ersatztv-next
spec:
  chartRef:
    kind: OCIRepository
    name: ersatztv-next
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      ersatztv-next:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: ghcr.io/ersatztv/next
              tag: develop@sha256:45f1418ed0c4a52ded6571f1979cd19fb875f9254490d20e5ca668e7f4f4b66d
            command:
              - /bin/sh
              - -c
              - |
                echo '{"server":{"bind_address":"0.0.0.0:8409"},"output":{"folder":"/config"},"xmltv":{"folder":"/config"}}' > /config/lineup.json
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: ghcr.io/ersatztv/next
              tag: develop@sha256:45f1418ed0c4a52ded6571f1979cd19fb875f9254490d20e5ca668e7f4f4b66d
            env:
              TZ: Europe/Lisbon
              XDG_DATA_HOME: /config
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8409
    route:
      app:
        hostnames: ["tvnext.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/media
        globalMounts:
          - path: /data
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          ersatztv-next:
            app:
              - path: /transcode
                subPath: transcode
              - path: /tmp
                subPath: tmp
