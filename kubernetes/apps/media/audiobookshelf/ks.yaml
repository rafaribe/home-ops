---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app audiobookshelf
  namespace: flux-system
spec:
  path: ./kubernetes/apps/media/audiobookshelf/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: kanidm
      namespace: security
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 2Gi
      GATUS_SUBDOMAIN: audiobookshelf
      KANIDM_APP_ICON: https://cdn.jsdelivr.net/gh/selfhst/icons/png/audiobookshelf.png
      KANIDM_CLIENT_ID_KEY: CLIENT_ID
      KANIDM_CLIENT_SECRET_KEY: CLIENT_SECRET
      KANIDM_GROUP: household
      KANIDM_ORIGIN_HOST: audiobookshelf.rafaribe.com
      KANIDM_REDIRECT_PATH: auth/openid/callback
  components:
    - ../../../../components/volsync
    - ../../../../components/kanidm
