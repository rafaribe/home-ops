---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stash
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      stash:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: Always
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1114
        initContainers:
          fix-stash-perms:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - sh
              - -c
              - |
                set -ex
                chown -R 1114:1001 /.stash
                chmod -R u=rwX,g=rwX,o= /.stash
            securityContext:
              capabilities:
                add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
                drop: ["ALL"]
              runAsNonRoot: false
              runAsUser: 0
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/stash
              tag: 0.31.1@sha256:869f910b26e7605676531e8823fa8c8ea66a329dd1b737e342a1a77ba7b77f22
            env:
              STASH_CACHE: /data/cache/
              STASH_GENERATED: /data/generated/
              STASH_METADATA: /data/metadata/
              STASH_STASH: /media/
              TZ: Europe/Lisbon
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 9999
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
          uploader:
            image:
              repository: docker.io/gtstef/filebrowser
              tag: 1.4.0-stable-slim@sha256:c998b094205179f74dd9c4740af289fa4b2d4f7b0e6fb378eefe677eb14fa9e4
            probes:
              liveness: &uploader-probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &uploader-port 80
                  periodSeconds: 10
              readiness: *uploader-probes
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true
    configMaps:
      uploader-config:
        data:
          config.yaml: |
            auth:
              methods:
                noauth: true
            server:
              sources:
                - path: /media
                  config:
                    defaultEnabled: true
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
      uploader:
        controller: *app
        ports:
          http:
            port: *uploader-port
    route:
      app:
        hostnames: ["stash.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
      uploader:
        hostnames: ["stash-upload.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: uploader
                port: http
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /.stash
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      filebrowser-config:
        type: configMap
        name: stash-uploader-config
        advancedMounts:
          stash:
            uploader:
              - path: /home/filebrowser/data/config.yaml
                subPath: config.yaml
                readOnly: true
      filebrowser-db:
        type: emptyDir
        advancedMounts:
          stash:
            uploader:
              - path: /home/filebrowser/data/db
      media:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/media
        globalMounts:
          - path: /media
