---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr
spec:
  chartRef:
    kind: OCIRepository
    name: dispatcharr
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      dispatcharr:
        strategy: Recreate
        annotations:
          glance/description: Media Dispatcher
          glance/icon: di:dispatcharr
          glance/id: dispatcharr
          glance/name: Dispatcharr
          glance/url: https://dispatcharr.rafaribe.com
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
        containers:
          app:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.27.2-20260703141021@sha256:a077d2a2589f7908e7336a1a1a9957d0dc192446099a8e4e6bc418b87309fc19
            env:
              TZ: Europe/Lisbon
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &httpPort 9191
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: mdi-television-play
          gethomepage.dev/name: Dispatcharr
        hostnames:
          - dispatcharr.rafaribe.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    defaultPodOptions:
      tolerations:
        - key: node-role.kubernetes.io/memory
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - memory
    service:
      app:
        controller: *app
        ports:
          http:
            port: *httpPort
