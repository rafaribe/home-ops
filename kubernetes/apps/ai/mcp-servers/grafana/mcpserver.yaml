---
# yaml-language-server: $schema=https://ks.hsn.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana-mcp
spec:
  groupRef:
    name: mcp-tools
  image: mcp/grafana:latest
  mcpPort: 8000
  env:
    - name: GRAFANA_URL
      value: http://grafana.observability:3000
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
  secrets:
    - name: grafana-mcp-secret
      key: GRAFANA_API_KEY
  transport: sse
