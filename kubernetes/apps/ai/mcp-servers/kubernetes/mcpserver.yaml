---
# yaml-language-server: $schema=https://ks.hsn.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: kubernetes-mcp
spec:
  args:
    - --port=8080
    - --read-only
    - --stateless
  groupRef:
    name: mcp-tools
  image: ghcr.io/containers/kubernetes-mcp-server:latest
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
  proxyPort: 8080
  transport: streamable-http
