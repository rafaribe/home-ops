---
# yaml-language-server: $schema=https://ks.hsn.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mealie-mcp
  namespace: flux-system
spec:
  targetNamespace: ai
  commonMetadata:
    labels:
      app.kubernetes.io/name: mealie-mcp
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
    - name: mealie
      namespace: services
    - name: toolhive-operator-crds
  interval: 1h
  path: ./kubernetes/apps/ai/mcp-servers/mealie
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
