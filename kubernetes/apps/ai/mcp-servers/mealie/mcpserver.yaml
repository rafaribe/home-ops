---
# yaml-language-server: $schema=https://ks.hsn.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mealie-mcp
spec:
  groupRef:
    name: mcp-tools
  image: ghcr.io/rafaribe/mealie-mcp-server:rolling
  env:
    - name: MEALIE_BASE_URL
      value: http://mealie.services:9000
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - /bin/sh
            - -c
            - |
              cd /app && PYTHONPATH=/app/src exec /app/.venv/bin/python -c "
              import sys, os
              sys.path.insert(0, '/app/src')
              os.chdir('/app')
              from mcp.server.fastmcp import FastMCP
              from mealie import MealieFetcher
              from tools import register_all_tools
              from prompts import register_prompts
              mealie_url = os.environ.get('MEALIE_BASE_URL', 'http://localhost:9000')
              api_key = os.environ.get('MEALIE_API_KEY', '')
              mealie = MealieFetcher(base_url=mealie_url, api_key=api_key)
              mcp = FastMCP('mealie-mcp-server')
              register_all_tools(mcp, mealie)
              register_prompts(mcp)
              mcp.run(transport='stdio')
              "
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
  secrets:
    - name: mealie-mcp-secret
      key: MEALIE_API_KEY
  transport: stdio
