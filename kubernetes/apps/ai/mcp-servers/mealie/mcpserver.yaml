---
# yaml-language-server: $schema=https://ks.hsn.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mealie-mcp
spec:
  groupRef:
    name: mcp-tools
  image: ghcr.io/rafaribe/mealie-mcp-server:rolling
  env:
    - name: MEALIE_BASE_URL
      value: http://mealie.services:9000
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - /bin/sh
            - -c
            - cd /app && /app/.venv/bin/pip install -e . --target /tmp/site-packages --quiet && PYTHONPATH=/tmp/site-packages exec /app/.venv/bin/fastmcp run src/server.py
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
  secrets:
    - name: mealie-mcp-secret
      key: MEALIE_API_KEY
  transport: stdio
