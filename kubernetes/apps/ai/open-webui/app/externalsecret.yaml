---
# yaml-language-server: $schema=https://kochhaus-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app openwebui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *app
    template:
      data:
        # Database Init
        INIT_POSTGRES_HOST: &dbHost "home-ops-rw.database.svc.cluster.local"
        INIT_POSTGRES_DBNAME: &dbName openwebui
        INIT_POSTGRES_USER: &dbUser openwebui
        INIT_POSTGRES_PASS: &dbPass "{{ .POSTGRES_GENERIC_APP_PASSWORD }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # App
        DATABASE_URL: "postgres://openwebui:{{ .POSTGRES_GENERIC_APP_PASSWORD }}@home-ops-rw.database.svc.cluster.local/openwebui?sslmode=disable"
        WEBUI_SECRET_KEY: "{{ .POSTGRES_GENERIC_APP_PASSWORD }}"
        # OIDC
        ENABLE_OAUTH_SIGNUP: "true"
        OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
        OAUTH_PROVIDER_NAME: Kanidm
        OPENID_PROVIDER_URL: "https://idm.rafaribe.com/oauth2/openid/open-webui/.well-known/openid-configuration"
        OPENID_REDIRECT_URI: "https://chat.rafaribe.com/oauth/oidc/callback"
        # Redis
        # https://docs.openwebui.com/getting-started/advanced-topics/env-configuration/#redis
        ENABLE_WEBSOCKET_SUPPORT: "true"
        WEBSOCKET_MANAGER: "redis"
        WEBSOCKET_REDIS_URL: "redis://dragonfly.storage:6379"

  dataFrom:
    - extract:
        key: cloudnativepg
