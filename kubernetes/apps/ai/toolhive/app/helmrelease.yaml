---
# yaml-language-server: $schema=https://ks.hsn.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: toolhive-operator
spec:
  chartRef:
    kind: OCIRepository
    name: toolhive-operator
  interval: 30m
  values:
    operator:
      replicaCount: 1
      gc:
        gomemlimit: 460MiB
        gogc: 75
      livenessProbe:
        httpGet:
          path: /healthz
          port: health
        failureThreshold: 5
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /readyz
          port: health
        failureThreshold: 5
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 256Mi
      leaderElectionRole:
        name: toolhive-operator-leader-election-role
        binding:
          name: toolhive-operator-leader-election-rolebinding
        rules:
          - apiGroups:
              - ""
            resources:
              - configmaps
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete
          - apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete
          - apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch
          - apiGroups:
              - events.k8s.io
            resources:
              - events
            verbs:
              - create
              - patch
