---
# yaml-language-server: $schema=https://ks.hsn.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: docmost-mcp
spec:
  groupRef:
    name: mcp-tools
  image: ghcr.io/rafaribe/docmost-mcp:v0.2.1@sha256:58b65bf43bda8624992df6e70c15aad00530daeedf97d8ad638eb2b7280b16c0
  env:
    - name: DOCMOST_API_URL
      value: http://docmost.services:3000/api
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
  secrets:
    - name: docmost-mcp-secret
      key: DOCMOST_EMAIL
    - name: docmost-mcp-secret-password
      key: DOCMOST_PASSWORD
  transport: stdio
