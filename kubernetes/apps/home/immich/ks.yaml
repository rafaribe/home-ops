---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich-app
spec:
  targetNamespace: home
  commonMetadata:
    labels:
      app.kubernetes.io/name: immich
  dependsOn:
    - name: kanidm
      namespace: security
  interval: 30m
  path: ./kubernetes/apps/home/immich/app
  postBuild:
    substitute:
      APP: immich
      CLAIM: immich-library
      KANIDM_APP_ICON: https://cdn.jsdelivr.net/gh/selfhst/icons/png/immich.png
      KANIDM_CLIENT_ID_KEY: OIDC_CLIENT_ID
      KANIDM_CLIENT_SECRET_KEY: OIDC_CLIENT_SECRET
      KANIDM_GROUP: household
      KANIDM_ORIGIN_HOST: photos.rafaribe.com
      KANIDM_REDIRECT_PATH: auth/login
      KOPIUR_CAPACITY: 1Ti
  prune: true
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 1m
  wait: true
  components:
    - ../../../../components/dragonfly
    - ../../../../components/kanidm
