---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    controllers:
      server:
        strategy: RollingUpdate
        annotations:
          glance/description: Photo library and management
          glance/icon: di:immich
          glance/id: immich
          glance/name: Immich
          glance/url: https://photos.rafaribe.com
          reloader.stakater.com/auto: "true"
        pod:
          labels:
            gethomepage.dev/name: immich-server
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0
            envFrom: &dbEnvFrom
              - secretRef:
                  name: immich-db
          02-init-extensions:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0
              pullPolicy: IfNotPresent
            envFrom: *dbEnvFrom
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.2@sha256:14390f3dc9512dc3273b12ccee6363d9be16c388699abc3f3fe0498bb9829937
            env:
              IMMICH_MEDIA_LOCATION: &mediaLocation /usr/src/app/upload
              IMMICH_WORKERS_INCLUDE: api
            envFrom: &envFrom
              - configMapRef:
                  name: immich
              - secretRef:
                  name: immich
              - secretRef:
                  name: immich-db
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 4096Mi

      machine-learning:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: disk-size
                        operator: NotIn
                        values: ["small"]
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v3.0.2
            envFrom: *envFrom
            env:
              IMMICH_MEDIA_LOCATION: *mediaLocation
              IMMICH_WORKERS_EXCLUDE: api
              MPLCONFIGDIR: /cache/matplotlib
            securityContext: *securityContext
            resources:
              requests:
                cpu: 100m
                memory: 274M
              limits:
                memory: 3949M

    service:
      server:
        controller: server
        ports:
          http:
            port: &port 2283
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Immich
          gethomepage.dev/description: "Photo library and management"
          gethomepage.dev/icon: immich
          gethomepage.dev/widget.type: immich
          gethomepage.dev/widget.url: &url "http://immich-server.home:2283"
          gethomepage.dev/widget.key: "{{ `{{HOMEPAGE_VAR_IMMICH_API_KEY}}`}}"
          gethomepage.dev/widget.version: "2"
          gethomepage.dev/siteMonitor: *url
          gethomepage.dev/pod-selector: >-
            gethomepage.dev/name in (immich-server)
        hostnames: ["photos.rafaribe.com"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - name: &backend immich-server
                port: *port
      internal:
        hostnames: ["immich.rafaribe.com", "pics.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *backend
                port: *port

    configMaps:
      immich:
        data:
          IMMICH_SERVER_URL: http://immich-server.home.svc.cluster.local:2283
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.home.svc.cluster.local:3003
          PUBLIC_IMMICH_SERVER_URL: https://immich.rafaribe.com
          LOG_LEVEL: log
          NODE_ENV: production
          UPLOAD_LOCATION: /usr/src/app/upload
          REDIS_HOSTNAME: immich-dragonfly.home.svc.cluster.local
          REDIS_PORT: "6379"

    persistence:
      library:
        type: nfs
        server: truenas.rafaribe.com
        path: /mnt/tank/immich
        globalMounts:
          - path: /usr/src/app/upload

      cache:
        type: persistentVolumeClaim
        existingClaim: immich-ml-cache
        advancedMounts:
          machine-learning:
            main:
              - path: /cache
                subPath: cache
              - path: /.cache
                subPath: dotCache

      tmp:
        type: emptyDir
        medium: Memory
        advancedMounts:
          server:
            main:
              - path: /tmp
                subPath: tmp
              - path: /usr/src/app/.reverse-geocoding-dump
                subPath: geocoding
              - path: /usr/src/app/.transformers_cache
                subPath: transformers
          machine-learning:
            main:
              - path: /tmp
                subPath: tmp
