---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # App
  - ./helmrelease.yaml
  - ./externalsecret.yaml
patches:
  - target:
      group: kopiur.home-operations.com
      version: v1alpha1
      kind: SnapshotPolicy
      name: pgadmin
    patch: |
      - op: add
        path: /spec/mover
        value:
          securityContext:
            runAsUser: 5050
