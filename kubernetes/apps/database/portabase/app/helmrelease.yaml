---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app portabase
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      portabase:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/portabase/portabase
              tag: 1.16.2@sha256:fd935d327bf9cec3ae079372018e5586b617d3c41cb26f4518a2985cfc03f846
            env:
              DATABASE_URL: "file:/data/portabase.db"
              NODE_ENV: production
              PROJECT_URL: "https://portabase.rafaribe.com"
              TZ: Europe/Lisbon
            envFrom:
              - secretRef:
                  name: portabase
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
      nginx-lib:
        type: emptyDir
        globalMounts:
          - path: /var/lib/nginx
      nginx-lock:
        type: emptyDir
        globalMounts:
          - path: /var/lock
      nginx-logs:
        type: emptyDir
        globalMounts:
          - path: /var/log/nginx
      nginx-run:
        type: emptyDir
        globalMounts:
          - path: /run
    route:
      app:
        annotations:
          gethomepage.dev/description: Database Backup Tool
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Database
          gethomepage.dev/icon: https://raw.githubusercontent.com/Portabase/portabase/main/public/portabase.svg
          gethomepage.dev/name: Portabase
          gethomepage.dev/siteMonitor: http://portabase.database:80
        hostnames: ["portabase.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 80
    service:
      app:
        controller: portabase
        ports:
          http:
            port: 80
