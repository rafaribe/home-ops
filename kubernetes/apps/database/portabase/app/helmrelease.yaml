---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app portabase
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      portabase:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/portabase/portabase
              tag: 1.17.2@sha256:8bf79edfb717b554044d5470fe7affdb3b16fd1e18071f2a939d04a45419edf8
            env:
              NODE_ENV: production
              PROJECT_URL: "https://portabase.rafaribe.com"
              TZ: Europe/Lisbon
            envFrom:
              - secretRef:
                  name: portabase
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              runAsUser: 0
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
    route:
      app:
        annotations:
          gethomepage.dev/description: Database Backup Tool
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Database
          gethomepage.dev/icon: https://raw.githubusercontent.com/Portabase/portabase/main/public/portabase.svg
          gethomepage.dev/name: Portabase
          gethomepage.dev/siteMonitor: http://portabase.database:80
        hostnames: ["portabase.rafaribe.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 80
    service:
      app:
        controller: portabase
        ports:
          http:
            port: 80
